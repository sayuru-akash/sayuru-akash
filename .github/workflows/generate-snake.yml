name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SNAKE_USERNAME: sayuru-akash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Snake Base Animations
        uses: Platane/snk@v3.3.0
        with:
          github_user_name: ${{ env.SNAKE_USERNAME }}
          outputs: |
            dist/.snake-base.svg
            dist/.snake-base-dark.svg?palette=github-dark

      - name: Build Detailed Contribution Snake SVGs
        run: |
          node scripts/build-detailed-snake.mjs \
            --input dist/.snake-base.svg \
            --output dist/github-snake.svg \
            --theme light \
            --username "${{ env.SNAKE_USERNAME }}"

          node scripts/build-detailed-snake.mjs \
            --input dist/.snake-base-dark.svg \
            --output dist/github-snake-dark.svg \
            --theme dark \
            --username "${{ env.SNAKE_USERNAME }}"

          rm -f dist/.snake-base.svg dist/.snake-base-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "chore: update github contribution snake"
          add: "dist/github-snake.svg dist/github-snake-dark.svg"
